<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chopped — Staff</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#f5f0e8;color:#2C1810}
button,input,select{font-family:inherit;cursor:pointer}
input{cursor:text}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-thumb{background:#d4c4a0;border-radius:4px}

#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#2C1810,#5C2D0E);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:999;overflow-y:auto}
#login-screen.hidden{display:none}
.login-logo{font-size:52px;margin-bottom:12px}
.login-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:#D4A574;font-size:13px;margin-bottom:28px;text-align:center}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:340px;margin-bottom:20px}
.role-btn{padding:16px 8px;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:14px;color:#fff;font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.2s}
.role-btn:hover{background:rgba(255,255,255,0.2)}
.role-btn.selected{background:#D4A574;border-color:#D4A574;color:#2C1810}
.role-icon{font-size:26px}
.pw-box{width:100%;max-width:320px;display:none}
.pw-label{color:#D4A574;font-size:12px;margin-bottom:8px;display:block;text-align:center}
.pw-input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;font-size:18px;text-align:center;letter-spacing:4px;outline:none;margin-bottom:10px;box-sizing:border-box}
.pw-input::placeholder{letter-spacing:0;color:rgba(255,255,255,0.4);font-size:13px}
.pw-input:focus{border-color:rgba(255,255,255,0.5)}
.pw-btn{width:100%;padding:14px;background:#D4A574;color:#2C1810;border:none;border-radius:12px;font-size:15px;font-weight:700}
.pw-error{color:#ff8a8a;font-size:12px;text-align:center;min-height:18px;margin-bottom:6px}

#app{display:none}
#app.visible{display:block}
#header{background:linear-gradient(135deg,#2C1810,#5C2D0E);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#header-title{color:#fff;font-size:15px;font-weight:700}
#header-right{display:flex;align-items:center;gap:8px}
#notif-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:50%;width:32px;height:32px;font-size:15px;color:#fff;display:flex;align-items:center;justify-content:center}
@keyframes flashNew{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0.35)}}
.flash-new{animation:flashNew 1s ease-in-out 3;border:2px solid #dc2626!important}
#lang-toggle{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:3px;display:flex;gap:2px}
.lang-btn{padding:3px 9px;border-radius:16px;font-size:11px;border:none;background:transparent;color:rgba(255,255,255,0.7)}
.lang-btn.active{background:#fff;color:#2C1810;font-weight:600}
#logout-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;color:#fff;font-size:11px;padding:4px 10px}
#tabs{background:#fff;border-bottom:1px solid #e8e0d0;display:flex;position:sticky;top:57px;z-index:99}
.tab-btn{flex:1;padding:10px 4px;border:none;background:none;font-size:11px;color:#8B7355;border-bottom:2.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all 0.2s}
.tab-icon{font-size:16px}
.tab-btn.active{color:#5C2D0E;border-bottom-color:#5C2D0E;font-weight:700}
#content{padding:14px;max-width:700px;margin:0 auto}

.card{background:#fff;border:1px solid #e8e0d0;border-radius:12px;padding:14px;margin-bottom:10px}
.alert{background:#FFF3CD;border:1px solid #FFC107;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:#856404}
.section-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-weight:600;font-size:15px;color:#2C1810}
.refresh-btn{background:#5C2D0E;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600}
.sync-info{font-size:11px;color:#8B7355;margin-bottom:12px}
.empty{text-align:center;padding:40px 20px;color:#8B7355;font-size:14px}

.order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.order-id{font-weight:700;font-size:14px}
.order-customer{font-size:13px;color:#5C4033}
.order-time{font-size:11px;color:#8B7355}
.order-total{font-size:14px;font-weight:700;color:#5C2D0E;margin-top:4px}
.status-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.s-new{background:#FFF8EC;color:#B5873A}
.s-confirmed{background:#F0FDF4;color:#166534}
.s-cooking{background:#FEF2F2;color:#dc2626}
.s-done{background:#F1F5F9;color:#64748b}
.order-items-text{font-size:12px;color:#5C4033;background:#faf7f2;border-radius:8px;padding:8px 10px;margin-bottom:12px;line-height:1.8}
.order-actions{display:flex;gap:8px}
.btn-confirm{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:600;border:none;background:#5C2D0E;color:#fff}
.btn-reject{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid #dc2626;background:#fef2f2;color:#dc2626}
.btn-kitchen{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:600;border:none;background:#dc2626;color:#fff}
.cooking-label{font-size:12px;color:#dc2626;font-weight:600;padding:8px 0}

.kitchen-card{background:#fff;border:2px solid #dc2626;border-radius:12px;padding:14px;margin-bottom:10px}
.kitchen-id{font-size:22px;font-weight:700;color:#5C2D0E}
.kitchen-name{font-size:13px;color:#5C4033;margin-bottom:10px}
.kitchen-item{font-size:14px;color:#2C1810;padding:6px 0;border-bottom:1px solid #f0ebe0;display:flex;justify-content:space-between}
.kitchen-item:last-of-type{border-bottom:none}
.kitchen-qty{font-weight:700;color:#5C2D0E}
.btn-done{width:100%;padding:12px;background:#22c55e;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;margin-top:12px}

.admin-section-title{font-size:13px;font-weight:700;color:#5C2D0E;margin-bottom:8px;padding:7px 12px;background:#FFF8EC;border-radius:8px;border-right:3px solid #5C2D0E}
.admin-item{background:#fff;border:1px solid #e8e0d0;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.admin-item-name{font-size:12px;font-weight:500;color:#2C1810}
.admin-item-price{font-size:13px;font-weight:700;color:#5C2D0E;margin-top:2px}
.admin-actions-btns{display:flex;gap:6px;flex-shrink:0}
.edit-btn{width:32px;height:32px;border-radius:8px;border:1px solid #d4c4a0;background:#f5f0e8;color:#5C2D0E;font-size:15px}
.del-btn{width:32px;height:32px;border-radius:8px;border:1px solid #fecaca;background:#fef2f2;color:#dc2626;font-size:15px}
.add-toggle-btn{width:100%;padding:12px;border:2px dashed #d4c4a0;border-radius:12px;background:transparent;color:#5C2D0E;font-size:13px;font-weight:600;margin-bottom:14px}
.form-card{background:#faf7f2;border:1px solid #e8e0d0;border-radius:12px;padding:16px;margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:#8B7355}
.text-input{width:100%;padding:10px 12px;border:1px solid #d4c4a0;border-radius:8px;font-size:13px;background:#fff;outline:none;box-sizing:border-box}
.text-input:focus{border-color:#5C2D0E}
.save-btn{width:100%;padding:12px;background:#5C2D0E;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;margin-top:4px}

/* REPORTS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid #e8e0d0;border-radius:14px;padding:16px;text-align:center;border-right:4px solid #5C2D0E}
.stat-val{font-size:30px;font-weight:800;color:#5C2D0E;margin-bottom:4px}
.stat-lbl{font-size:12px;color:#8B7355}
.top-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0ebe0;font-size:13px}
.top-item:last-child{border-bottom:none}
.top-item-name{color:#2C1810;flex:1}
.top-item-count{font-weight:700;color:#5C2D0E;background:#FFF8EC;padding:2px 10px;border-radius:20px;font-size:12px}
.report-section{background:#fff;border:1px solid #e8e0d0;border-radius:12px;padding:14px;margin-bottom:12px}
.report-title{font-weight:700;font-size:13px;color:#2C1810;margin-bottom:12px;display:flex;align-items:center;gap:6px}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.25);white-space:nowrap;display:none;pointer-events:none}
#toast.show{display:block}
#toast.ok{background:#22c55e;color:#fff}
#toast.err{background:#ef4444;color:#fff}
</style>
</head>

</div>

function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    for (var n = 0; n < 2; n++) {
      (function(delay){
        setTimeout(function(){
          var osc = audioCtx.createOscillator();
          var gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.type = "sine"; osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
          osc.start(); osc.stop(audioCtx.currentTime + 0.35);
        }, delay);
      })(n * 400);
    }
  } catch(e) { console.error("beep error:", e); }
}

function startAlertLoop() {
  if (alertTimer) return;
  playBeep();
  alertTimer = setInterval(function(){
    if (ringingIds.length === 0) { stopAlertLoop(); return; }
    playBeep();
  }, 4000);
}

function stopAlertLoop() {
  if (alertTimer) { clearInterval(alertTimer); alertTimer = null; }
}

function acknowledgeOrder(orderId) {
  ringingIds = ringingIds.filter(function(id){ return id !== orderId; });
  latestNewIds = latestNewIds.filter(function(id){ return id !== orderId; });
  if (ringingIds.length === 0) stopAlertLoop();
  render();
}

function enableNotifications() {
  notifEnabled = true;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  playBeep();
  render();
}

function disableNotifications() {
  notifEnabled = false;
  stopAlertLoop();
  render();
}
var alertAudioCtx = null;

function t(a, e) { return lang === "ar" ? a : e; }

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function getCat(id) {
  for (var i = 0; i < CATEGORIES.length; i++) {
    if (CATEGORIES[i].id === id) return CATEGORIES[i];
  }
  return {ar:"", en:"", emoji:""};
}

function getItem(id) {
  for (var i = 0; i < menu.length; i++) {
    if (menu[i].id == id) return menu[i];
  }
  return null;
}

function showToast(msg, type) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show " + (type || "ok");
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.className = ""; }, 3000);
}

// ---- LOGIN ----
function selectRole(role) {
  selectedRole = role;
  var roles = ["manager","kitchen","admin","gm"];
  for (var i = 0; i < roles.length; i++) {
    var el = document.getElementById("role-" + roles[i]);
    if (el) el.className = "role-btn" + (roles[i] === role ? " selected" : "");
  }
  var names = {
    manager: t("المدير","Manager"),
    kitchen: t("المطبخ","Kitchen"),
    admin: t("الإدارة","Admin"),
    gm: t("المدير العام","General Manager")
  };
  document.getElementById("pw-box").style.display = "block";
  document.getElementById("pw-label").textContent = t("كلمة المرور لـ ","Password for ") + names[role];
  document.getElementById("pw-error").textContent = "";
  document.getElementById("pw-input").value = "";
  setTimeout(function(){ document.getElementById("pw-input").focus(); }, 100);
}

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("pw-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") tryLogin();
  });
});

function tryLogin() {
  if (!selectedRole) return;
  var entered = document.getElementById("pw-input").value;
  if (entered === PASSWORDS[selectedRole]) {
    currentRole = selectedRole;
    currentTab = (selectedRole === "admin") ? "admin" : (selectedRole === "gm") ? "reports" : selectedRole;
    document.getElementById("login-screen").className = "hidden";
    document.getElementById("app").className = "visible";
    buildTabs();
    if (currentRole === "manager" || currentRole === "kitchen" || currentRole === "admin" || currentRole === "gm") {
      loadOrders();
      autoTimer = setInterval(loadOrders, 30000);
    }
    render();
  } else {
    document.getElementById("pw-error").textContent = t("❌ كلمة المرور غير صحيحة","❌ Incorrect password");
    document.getElementById("pw-input").value = "";
    var inp = document.getElementById("pw-input");
    inp.style.borderColor = "#ff4444";
    setTimeout(function(){ inp.style.borderColor = ""; }, 1000);
  }
}

function logout() {
  if (autoTimer) clearInterval(autoTimer);
  currentRole = null; currentTab = null; selectedRole = null;
  orders = [];
  document.getElementById("login-screen").className = "";
  document.getElementById("app").className = "";
  document.getElementById("pw-box").style.display = "none";
  document.getElementById("pw-input").value = "";
  document.getElementById("pw-error").textContent = "";
  var roles = ["manager","kitchen","admin","gm"];
  for (var i = 0; i < roles.length; i++) {
    var el = document.getElementById("role-" + roles[i]);
    if (el) el.className = "role-btn";
  }
}

function switchTab(tab) {
  currentTab = tab;
  var btns = document.querySelectorAll(".tab-btn");
  for (var i = 0; i < btns.length; i++) {
    var onclick = btns[i].getAttribute("onclick") || "";
    btns[i].className = "tab-btn" + (onclick.indexOf("'" + tab + "'") >= 0 ? " active" : "");
  }
  render();
}

// ---- API ----
async function loadOrders() {
  if (!IS_CONFIGURED) return;
  try {
    var data = await supabaseFetch("orders?select=*&order=id.desc", { method: "GET" });
    var newList = data.map(function(o) {
      return {
        id: "#" + String(o.id).padStart(3,"0"),
        customer: o.customer,
        phone: o.phone || "",
        compound: o.compound || "",
        villa: o.villa || "",
        items: typeof o.items === "string" ? JSON.parse(o.items) : (o.items || []),
        total: o.total,
        status: o.status || "new",
        timestamp: o.created_at ? new Date(o.created_at).toLocaleString("ar-SA") : "",
        _raw_id: o.id
      };
    });
    if (knownOrderIds !== null) {
      var freshIds = [];
      for (var i = 0; i < newList.length; i++) {
        if (knownOrderIds.indexOf(newList[i]._raw_id) === -1) freshIds.push(newList[i]._raw_id);
      }
      if (freshIds.length > 0) {
        latestNewIds = latestNewIds.concat(freshIds);
        ringingIds = ringingIds.concat(freshIds);
        if (notifEnabled) startAlertLoop();
        render();
      }
    }
    // إذا أي طلب جديد صار حالته غير "new" (تم قبوله) نوقف رنينه
    ringingIds = ringingIds.filter(function(rid){
      var o = newList.find(function(x){ return x._raw_id === rid; });
      return o && o.status === "new";
    });
    latestNewIds = latestNewIds.filter(function(fid){
      var o = newList.find(function(x){ return x._raw_id === fid; });
      return o && o.status === "new";
    });
    if (ringingIds.length === 0) stopAlertLoop();
    knownOrderIds = newList.map(function(o){ return o._raw_id; });
    orders = newList;
    lastSync = new Date();
    render();
  } catch(e) { console.error("loadOrders error:", e); }
}

async function updateStatus(orderId, status) {
  // Optimistic update
  var rawId = null;
  orders = orders.map(function(o) {
    if (o.id === orderId) { rawId = o._raw_id; return Object.assign({}, o, {status: status}); }
    return o;
  });
  if (rawId !== null) acknowledgeOrder(rawId);
  render();
  try {
    if (rawId !== null) {
      await supabaseFetch("orders?id=eq." + rawId, {
        method: "PATCH",
        body: JSON.stringify({ status: status })
      });
    }
    showToast(t("تم التحديث ✓","Updated ✓"));
  } catch(e) {
    console.error("updateStatus error:", e);
    showToast(t("خطأ في التحديث","Update error"), "err");
  }
}

// ---- RENDER ----
function render() {
  var nb = document.getElementById("notif-btn");
  if (nb) nb.innerHTML = notifEnabled ? "🔔" : "🔕";
  if (!currentRole || !currentTab) return;
  var c = document.getElementById("content");
  if (currentTab === "manager") c.innerHTML = renderManager();
  else if (currentTab === "kitchen") c.innerHTML = renderKitchen();
  else if (currentTab === "admin") c.innerHTML = renderAdmin();
  else if (currentTab === "reports") c.innerHTML = renderReports();
}

    html += '<span style="color:#2C1810">' + st.label + '</span>';
    html += '<span style="font-weight:700;color:' + st.color + '">' + cnt + ' (' + pct + '%)</span></div>';
    html += '<div style="height:8px;background:#f0ebe0;border-radius:4px;overflow:hidden">';
    html += '<div style="height:100%;width:' + pct + '%;background:' + st.color + ';border-radius:4px;transition:width 0.5s"></div></div></div>';
  }
  html += '</div>';

  if (lastSync) html += '<div class="sync-info" style="margin-top:8px">' + t("آخر تحديث:","Last sync:") + ' ' + lastSync.toLocaleTimeString() + '</div>';
  return html;
}

// ---- ADMIN ----
function renderAdmin() {
  var html = '<div style="font-weight:600;font-size:15px;color:#2C1810;margin-bottom:14px">⚙️ ' + t("إدارة المنيو","Menu Management") + '</div>';
  html += '<button class="add-toggle-btn" onclick="toggleForm()">' + (showAdminForm ? t("✕ إخفاء","✕ Hide") : t("➕ إضافة منتج","➕ Add Product")) + '</button>';
  if (showAdminForm) {
    var fi = editingId ? getItem(editingId) : null;
    html += '<div class="form-card"><div style="font-weight:600;font-size:13px;margin-bottom:12px">' + (editingId ? t("✏️ تعديل","✏️ Edit") : t("➕ جديد","➕ New")) + '</div>';
    html += '<div class="form-group" style="margin-bottom:10px"><label>' + t("الاسم *","Name *") + '</label>';
    html += '<input class="text-input" id="f-name" value="' + esc(fi ? fi.name : "") + '" placeholder="e.g. Beef Steak 500gr"></div>';
    html += '<div class="form-row"><div class="form-group"><label>' + t("السعر *","Price *") + '</label>';
    html += '<input class="text-input" id="f-price" type="number" value="' + (fi ? fi.price : "") + '" placeholder="0.00" style="direction:ltr"></div>';
    html += '<div class="form-group"><label>' + t("الفئة","Category") + '</label><select class="text-input" id="f-cat">';
    for (var i = 0; i < CATEGORIES.length; i++) {
      var c = CATEGORIES[i];
      var sel = (fi && fi.cat === c.id) ? " selected" : "";
      html += '<option value="' + c.id + '"' + sel + '>' + c.emoji + ' ' + (lang === "ar" ? c.ar : c.en) + '</option>';
    }
    html += '</select></div></div><button class="save-btn" onclick="saveItem()">💾 ' + t("حفظ","Save") + '</button></div>';
  }
  for (var ci = 0; ci < CATEGORIES.length; ci++) {
    var cat = CATEGORIES[ci];
    var catItems = menu.filter(function(m){ return m.cat === cat.id; });
    if (catItems.length === 0) continue;
    html += '<div style="margin-bottom:20px"><div class="admin-section-title">' + cat.emoji + ' ' + (lang === "ar" ? cat.ar : cat.en) + ' (' + catItems.length + ')</div>';
    for (var mi = 0; mi < catItems.length; mi++) {
      var m = catItems[mi];
      html += '<div class="admin-item"><div style="flex:1"><div class="admin-item-name">' + esc(m.name) + '</div>';
      html += '<div class="admin-item-price">' + m.price.toFixed(2) + ' ' + t("ر.س","SAR") + '</div></div>';
      html += '<div class="admin-actions-btns">';
      html += '<button class="edit-btn" onclick="startEdit(' + m.id + ')">✏️</button>';
      html += '<button class="del-btn" onclick="delItem(' + m.id + ')">🗑️</button>';
      html += '</div></div>';
    }
    html += '</div>';
  }
  return html;
}

function toggleForm() { showAdminForm = !showAdminForm; editingId = null; render(); }

function startEdit(id) {
  editingId = id; showAdminForm = true; render();
  setTimeout(function(){
    var el = document.querySelector(".form-card");
    if (el) el.scrollIntoView({behavior:"smooth"});
  }, 100);
}

function delItem(id) {
  if (confirm(t("حذف هذا المنتج؟","Delete this product?"))) {
    menu = menu.filter(function(m){ return m.id !== id; });
    showToast(t("تم الحذف","Deleted"));
    render();
  }
}

function saveItem() {
  var n = (document.getElementById("f-name") || {}).value || "";
  var p = parseFloat((document.getElementById("f-price") || {}).value || 0);
  var c = (document.getElementById("f-cat") || {}).value || "daily";
  if (!n.trim() || !p) return showToast(t("اكمل البيانات","Fill all fields"), "err");
  if (editingId) {
    menu = menu.map(function(m){ return m.id === editingId ? {id:m.id, name:n, price:p, cat:c} : m; });
    showToast(t("تم التعديل ✓","Updated ✓"));
  } else {
    menu.push({id: Date.now(), name: n, price: p, cat: c});
    showToast(t("تمت الإضافة ✓","Added ✓"));
  }
  showAdminForm = false; editingId = null; render();
}

function setLang(l) {
  lang = l;
  var btns = document.querySelectorAll(".lang-btn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].className = "lang-btn" + (btns[i].textContent.trim() === (l === "ar" ? "ع" : "EN") ? " active" : "");
  }
  document.documentElement.dir = l === "ar" ? "rtl" : "ltr";
  document.documentElement.lang = l;
  document.getElementById("rl-manager").textContent = t("المدير","Manager");
  document.getElementById("rl-kitchen").textContent = t("المطبخ","Kitchen");
  document.getElementById("rl-admin").textContent = t("الإدارة","Admin");
  document.getElementById("rl-gm").textContent = t("المدير العام","General Manager");
  document.getElementById("login-sub").textContent = t("اختر دورك وأدخل كلمة المرور","Choose your role and enter password");
  if (currentRole) { buildTabs(); render(); }
}
</script>
</body>
