var lang="ar", cart={}, activeCat="all", searchText="", customerName="", customerPhone="", orderCounter=1;

function t(a,e){return lang==="ar"?a:e;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function getCat(id){return CATEGORIES.find(function(c){return c.id===id;})||{ar:"",en:"",emoji:""};}
function cartCount(){return Object.values(cart).reduce(function(s,q){return s+q;},0);}
function cartTotal(){return Object.entries(cart).reduce(function(s,e){var m=MENU.find(function(x){return x.id==e[0];});return s+(m?m.price*e[1]:0);},0);}
function addItem(id){cart[id]=(cart[id]||0)+1;render();}
function remItem(id){if(cart[id]>1)cart[id]--;else delete cart[id];render();}

function showToast(msg,type){
  var el=document.getElementById("toast");
  el.textContent=msg; el.className="show "+(type||"ok");
  clearTimeout(el._t); el._t=setTimeout(function(){el.className="";},3000);
}

function setLang(l){
  lang=l;
  document.querySelectorAll(".lang-btn").forEach(function(b){
    b.className="lang-btn"+(b.textContent.trim()===(l==="ar"?"ع":"EN")?" active":"");
  });
  document.documentElement.dir=l==="ar"?"rtl":"ltr";
  document.documentElement.lang=l;
  render();
}

function updateCartBar(){
  var bar=document.getElementById("cart-bar");
  var n=cartCount();
  if(n>0){
    bar.className="visible";
    document.getElementById("cart-count").textContent=n+" "+t("صنف","items");
    document.getElementById("cart-total").textContent=cartTotal().toFixed(2)+" "+t("ر.س","SAR");
    document.getElementById("wa-btn").textContent="📱 "+t("إرسال الطلب","Send Order");
  } else { bar.className=""; }
}

function onSearch(val){
  searchText = val;
  // Re-render only the menu list, not the whole page
  renderMenuOnly();
}

function clearSearch(){
  searchText = "";
  render();
}

function renderMenuOnly(){
  // Update just the items list without touching the search input
  var items = MENU.filter(function(m){
    return (activeCat==="all"||m.cat===activeCat) && m.name.toLowerCase().indexOf(searchText.toLowerCase())>=0;
  });
  var listEl = document.getElementById("menu-list");
  if(!listEl){ render(); return; }
  var html = "";
  if(items.length===0){
    html='<div class="empty">🔍 '+t("لا توجد نتائج","No results")+'</div>';
  } else {
    items.forEach(function(m){
      var cat=getCat(m.cat), qty=cart[m.id]||0;
      html+='<div class="menu-item"><div style="flex:1;margin-inline-end:10px"><div class="item-cat">'+cat.emoji+' '+(lang==="ar"?cat.ar:cat.en)+'</div>';
      html+='<div class="item-name">'+esc(m.name)+'</div><div class="item-price">'+m.price.toFixed(2)+' '+t("ر.س","SAR")+'</div></div>';
      if(qty===0) html+='<button class="add-btn" onclick="addItem('+m.id+')">+</button>';
      else html+='<div class="qty-ctrl"><button class="qty-btn" onclick="remItem('+m.id+')">−</button><span class="qty-num">'+qty+'</span><button class="qty-btn" onclick="addItem('+m.id+')">+</button></div>';
      html+='</div>';
    });
  }
  listEl.innerHTML = html;
  // Update clear button
  var clearBtn = document.getElementById("clear-search");
  if(searchText && !clearBtn){
    var searchBox = document.getElementById("search-box");
    if(searchBox){
      var btn = document.createElement("button");
      btn.id = "clear-search";
      btn.setAttribute("onclick","clearSearch()");
      btn.className = "";
      btn.style.cssText = "border:none;background:none;font-size:20px;color:#8B7355;line-height:1;cursor:pointer";
      btn.textContent = "×";
      searchBox.appendChild(btn);
    }
  } else if(!searchText && clearBtn){
    clearBtn.remove();
  }
  updateCartBar();
}

function render(){
  updateCartBar();
  var items=MENU.filter(function(m){
    return (activeCat==="all"||m.cat===activeCat) && m.name.toLowerCase().indexOf(searchText.toLowerCase())>=0;
  });
  var html="";
  if(!IS_CONFIGURED) html+='<div class="alert">⚠️ '+t("وضع تجريبي — الطلبات لن تُحفظ.","Demo mode — orders not saved.")+'</div>';
  html+='<div class="card" style="margin-bottom:12px"><div class="input-label">'+t("اسمك *","Your name *")+'</div>';
  html+='<input class="text-input" id="cname" placeholder="'+t("مثال: محمد","e.g. Mohammed")+'" value="'+esc(customerName)+'" oninput="customerName=this.value"></div>';
  html+='<div class="card" style="margin-bottom:12px"><div class="input-label">'+t("رقم جوالك *","Your phone *")+'</div>';
  html+='<input class="text-input" id="cphone" type="tel" placeholder="'+t("مثال: 0501234567","e.g. 0501234567")+'" value="'+esc(customerPhone)+'" oninput="customerPhone=this.value"></div>';
  html+='<div id="search-box"><span>🔍</span><input id="search-input" placeholder="'+t("ابحث...","Search...")+'" value="'+esc(searchText)+'" oninput="onSearch(this.value)">';
  if(searchText) html+='<button id="clear-search" onclick="clearSearch()">×</button>';
  html+='</div><div id="cat-row"><button class="cat-pill'+(activeCat==="all"?" active":"")+'" onclick="activeCat=\'all\';render()">'+t("الكل","All")+'</button>';
  CATEGORIES.forEach(function(c){html+='<button class="cat-pill'+(activeCat===c.id?" active":"")+'" onclick="activeCat=\''+c.id+'\';render()">'+c.emoji+' '+(lang==="ar"?c.ar:c.en)+'</button>';});
  html+='</div><div id="menu-list" style="margin-bottom:'+(cartCount()>0?90:10)+'px">';
  if(items.length===0){html+='<div class="empty">🔍 '+t("لا توجد نتائج","No results")+'</div>';}
  else items.forEach(function(m){
    var cat=getCat(m.cat), qty=cart[m.id]||0;
    html+='<div class="menu-item"><div style="flex:1;margin-inline-end:10px"><div class="item-cat">'+cat.emoji+' '+(lang==="ar"?cat.ar:cat.en)+'</div>';
    html+='<div class="item-name">'+esc(m.name)+'</div><div class="item-price">'+m.price.toFixed(2)+' '+t("ر.س","SAR")+'</div></div>';
    if(qty===0) html+='<button class="add-btn" onclick="addItem('+m.id+')">+</button>';
    else html+='<div class="qty-ctrl"><button class="qty-btn" onclick="remItem('+m.id+')">−</button><span class="qty-num">'+qty+'</span><button class="qty-btn" onclick="addItem('+m.id+')">+</button></div>';
    html+='</div>';
  });
  html+='</div>';
  document.getElementById("content").innerHTML=html;
}

async function sendOrder(){
  var name=(document.getElementById("cname")||{}).value||customerName;
  customerName=name.trim();
  if(!cartCount()) return;
  if(!customerName) return showToast(t("أدخل اسمك أولاً","Enter your name first"),"err");
  var phone=(document.getElementById("cphone")||{}).value||customerPhone;
  customerPhone=phone.trim();
  if(!customerPhone) return showToast(t("أدخل رقم جوالك","Enter your phone number"),"err");
  var items=Object.entries(cart).map(function(e){var m=MENU.find(function(x){return x.id==e[0];});return {id:+e[0],name:m?m.name:"",qty:e[1],price:m?m.price:0};});
  var total=cartTotal().toFixed(2);
  var orderId="#"+String(orderCounter++).padStart(3,"0");
  if(IS_CONFIGURED){
    try{
      var inserted = await supabaseInsert("orders", {
        customer: customerName,
        phone: customerPhone,
        items: items,
        total: parseFloat(total),
        status: "new"
      });
      if(inserted && inserted[0] && inserted[0].id) orderId = "#" + String(inserted[0].id).padStart(3,"0");
    }catch(e){ console.error("Supabase error:", e); }
  }
  var lines=items.map(function(i){return "• "+i.name+" x"+i.qty+" — "+(i.price*i.qty).toFixed(2)+" SAR";}).join("\n");
  var msg="🛒 "+t("طلب جديد","New Order")+" - Chopped\n"+t("العميل:","Customer:")+customerName+" | "+t("جوال:","Phone:")+customerPhone+"\n\n"+lines+"\n\n"+t("الإجمالي:","Total:")+total+" SAR\n"+t("رقم الطلب:","Order:")+orderId;
  window.open("https://wa.me/"+WA_NUMBER+"?text="+encodeURIComponent(msg),"_blank");
  cart={}; customerName=""; customerPhone="";
  showToast(t("تم إرسال الطلب ","Order sent ")+orderId);
  render();
}

render();
</script>
